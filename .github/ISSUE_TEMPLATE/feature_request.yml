name: "Feature Request"
description: Suggest a new feature or improvement
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "Problem"
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
